<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Netflix Profiles</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Roboto', sans-serif;
    }

    body {
      background-color: #141414;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 40px;
      font-weight: 500;
    }

    .profiles {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .profile:hover {
      transform: scale(1.08);
    }

    .avatar {
      width: 150px;
      height: 150px;
      border-radius: 10px;
      background-size: cover;
      background-position: center;
      margin-bottom: 15px;
      border: 3px solid transparent;
      transition: border 0.2s ease;
    }

    .profile:hover .avatar {
      border: 3px solid #fff;
    }

    .name {
      font-size: 1.2rem;
      color: #b3b3b3;
      transition: color 0.2s ease;
    }

    .profile:hover .name {
      color: #fff;
    }

    .manage {
      margin-top: 60px;
      padding: 10px 25px;
      border: 1px solid #b3b3b3;
      background: transparent;
      color: #b3b3b3;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .manage:hover {
      color: #fff;
      border-color: #fff;
    }

    @media (max-width: 768px) {
      .avatar {
        width: 110px;
        height: 110px;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <h1>Who's watching?</h1>

  <div class="profiles">
    <div class="profile">
      <div class="avatar" style="background-image: url('https://i.pravatar.cc/300?img=1');"></div>
      <div class="name">Alex</div>
    </div>

    <div class="profile">
      <div class="avatar" style="background-image: url('https://i.pravatar.cc/300?img=2');"></div>
      <div class="name">Sam</div>
    </div>

    <div class="profile">
      <div class="avatar" style="background-image: url('https://i.pravatar.cc/300?img=3');"></div>
      <div class="name">Jordan</div>
    </div>

    <div class="profile">
      <div class="avatar" style="background-image: url('https://i.pravatar.cc/300?img=4');"></div>
      <div class="name">Kids</div>
    </div>
  </div>

  <button class="manage">Manage Profiles</button>
</body>
</html>
